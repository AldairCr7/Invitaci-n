<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para Ximena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --midnight: #0D1117;
      --gold:     #C9A96E;
      --gold-dim: #8C6E3F;
      --gold-hi:  #E2C48A;
      --cream:    #F0EAD6;
      --muted:    #6B7280;
    }

    html, body {
      width: 100%; min-height: 100%;
      background: var(--midnight);
      font-family: 'Lato', sans-serif;
      color: var(--cream);
      overflow: hidden;
    }

    #particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ── ESCENA PRINCIPAL ── */
    #scene {
      position: relative; z-index: 1;
      width: 100%; height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      opacity: 0;
      animation: sceneIn 1.4s ease forwards 0.3s;
    }
    @keyframes sceneIn { to { opacity: 1; } }

    #eyebrow {
      font-size: clamp(9px, 2vw, 11px);
      letter-spacing: 0.44em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: clamp(36px, 7vh, 60px);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 1s ease, transform 1s ease;
    }
    #eyebrow.visible { opacity: 1; transform: translateY(0); }

    /* ── SOBRE ── */
    #envelope-wrap {
      position: relative;
      width: clamp(280px, 72vw, 400px);
      cursor: pointer;
      transition: transform 0.35s ease, filter 0.35s ease;
    }
    #envelope-wrap:hover:not(.opening) {
      transform: translateY(-5px);
      filter: drop-shadow(0 32px 56px rgba(0,0,0,0.8));
    }
    #envelope-wrap.opening { cursor: default; pointer-events: none; }

    #envelope-svg {
      width: 100%;
      filter: drop-shadow(0 20px 44px rgba(0,0,0,0.7))
              drop-shadow(0 6px 14px rgba(0,0,0,0.5));
      overflow: visible;
    }

    #glow-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 130%; height: 130%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(201,169,110,0.10) 0%, transparent 65%);
      animation: glowPulse 3.5s ease-in-out infinite;
      pointer-events: none; z-index: -1;
    }
    @keyframes glowPulse {
      0%,100% { opacity: 0.45; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 0.9;  transform: translate(-50%,-50%) scale(1.07); }
    }

    /* ── TEXTO INFERIOR ── */
    #invite-text {
      margin-top: clamp(32px, 5.5vh, 50px);
      text-align: center;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    #invite-text.visible { opacity: 1; transform: translateY(0); }

    #invite-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.05rem, 3.5vw, 1.45rem);
      font-weight: 300;
      font-style: italic;
      color: var(--cream);
      letter-spacing: 0.02em;
      line-height: 1.3;
    }
    #invite-sub {
      margin-top: 10px;
      font-size: clamp(9px, 1.8vw, 10px);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--muted);
    }
    #invite-sub::after {
      content: '';
      display: inline-block;
      width: 1px; height: 0.85em;
      background: var(--gold);
      margin-left: 5px;
      vertical-align: middle;
      animation: blink 1.3s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── OVERLAY DE SALIDA ── */
    #exit-overlay {
      position: fixed; inset: 0;
      background: var(--midnight);
      opacity: 0; pointer-events: none;
      z-index: 50;
      transition: opacity 0.7s ease;
    }
    #exit-overlay.show { opacity: 1; }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="scene">
  <p id="eyebrow">Una carta para ti</p>

  <div id="envelope-wrap" id="envWrap">
    <div id="glow-ring"></div>

    <svg id="envelope-svg" viewBox="0 0 420 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="envBody" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#2A2218"/>
          <stop offset="100%" stop-color="#1A1610"/>
        </linearGradient>
        <linearGradient id="envFlapGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#221D14"/>
          <stop offset="100%" stop-color="#1C1811"/>
        </linearGradient>
        <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#5C4A28"/>
          <stop offset="30%"  stop-color="#C9A96E"/>
          <stop offset="60%"  stop-color="#E2C48A"/>
          <stop offset="100%" stop-color="#8C6E3F"/>
        </linearGradient>
        <linearGradient id="goldEdgeV" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#5C4A28"/>
          <stop offset="40%"  stop-color="#C9A96E"/>
          <stop offset="100%" stop-color="#8C6E3F"/>
        </linearGradient>
        <filter id="flapShadow" x="-5%" y="-5%" width="110%" height="120%">
          <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="rgba(0,0,0,0.45)"/>
        </filter>
        <filter id="subtleGlow">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Sombra bajo el sobre -->
      <ellipse cx="210" cy="276" rx="165" ry="11" fill="rgba(0,0,0,0.32)" filter="url(#subtleGlow)"/>

      <!-- Cuerpo del sobre -->
      <rect x="10" y="50" width="400" height="220" rx="3" fill="url(#envBody)"/>

      <!-- Paneles laterales e inferior internos -->
      <polygon points="10,50 10,270 200,168" fill="#1E1812" opacity="0.88"/>
      <polygon points="410,50 410,270 220,168" fill="#1E1812" opacity="0.88"/>
      <polygon points="10,270 410,270 210,156" fill="#211D15" opacity="0.94"/>

      <!-- Líneas internas suaves -->
      <line x1="10" y1="50" x2="210" y2="168" stroke="rgba(201,169,110,0.07)" stroke-width="1"/>
      <line x1="410" y1="50" x2="210" y2="168" stroke="rgba(201,169,110,0.07)" stroke-width="1"/>

      <!-- Borde dorado perimetral -->
      <rect x="10" y="50" width="400" height="220" rx="3" fill="none" stroke="url(#goldEdge)" stroke-width="1.1" opacity="0.65"/>

      <!-- Solapa trasera (visible cuando la delantera sube) -->
      <g id="flap-back">
        <polygon points="10,50 410,50 210,178" fill="#1B1710"/>
        <polyline points="10,50 410,50 210,178 10,50" fill="none" stroke="url(#goldEdgeV)" stroke-width="0.9" opacity="0.45"/>
      </g>

      <!-- Sello -->
      <g id="seal-group" transform="translate(210,130)">
        <circle r="25" fill="#8C6E3F" opacity="0.92"/>
        <circle r="22" fill="#7A5F34" opacity="0.88"/>
        <circle r="19" fill="#6B5028"/>
        <polygon points="0,-13 2.6,-4.8 11.2,-4.8 4.4,0.5 7,9 0,4.2 -7,9 -4.4,0.5 -11.2,-4.8 -2.6,-4.8"
                 fill="#C9A96E" opacity="0.88"/>
        <circle r="5.5" fill="#C9A96E" opacity="0.8"/>
        <circle r="3" fill="#2C1810" opacity="0.65"/>
        <circle r="25" fill="none" stroke="#C9A96E" stroke-width="0.75" opacity="0.55"/>
        <circle r="21" fill="none" stroke="#C9A96E" stroke-width="0.35" opacity="0.28" stroke-dasharray="2,2.5"/>
      </g>

      <!-- Solapa delantera -->
      <g id="flap-front" filter="url(#flapShadow)">
        <polygon id="flapFrontPoly" points="10,50 410,50 210,172" fill="url(#envFlapGrad)"/>
        <polyline points="10,50 210,172 410,50" fill="none" stroke="url(#goldEdge)" stroke-width="0.9" opacity="0.5"/>
      </g>

      <!-- Esquinas decorativas -->
      <g stroke="#C9A96E" stroke-width="0.65" fill="none" opacity="0.38">
        <g transform="translate(22,62)">
          <line x1="0" y1="8" x2="0" y2="0"/><line x1="0" y1="0" x2="8" y2="0"/>
        </g>
        <g transform="translate(398,62) scale(-1,1)">
          <line x1="0" y1="8" x2="0" y2="0"/><line x1="0" y1="0" x2="8" y2="0"/>
        </g>
        <g transform="translate(22,258) scale(1,-1)">
          <line x1="0" y1="8" x2="0" y2="0"/><line x1="0" y1="0" x2="8" y2="0"/>
        </g>
        <g transform="translate(398,258) scale(-1,-1)">
          <line x1="0" y1="8" x2="0" y2="0"/><line x1="0" y1="0" x2="8" y2="0"/>
        </g>
      </g>
    </svg>
  </div>

  <div id="invite-text">
    <p id="invite-main">Tienes una invitación.</p>
    <p id="invite-sub">Toca el sobre para abrirla</p>
  </div>
</div>

<div id="exit-overlay"></div>

<script>
/* ── PARTÍCULAS ── */
(function(){
  const cv = document.getElementById('particles');
  const ctx = cv.getContext('2d');
  let W, H;
  function resize(){ W = cv.width = innerWidth; H = cv.height = innerHeight; }
  resize(); addEventListener('resize', resize);
  class P {
    constructor(){ this.init(true); }
    init(rand){
      this.x = Math.random()*W; this.y = rand ? Math.random()*H : H+8;
      this.r = Math.random()*1.3+0.35;
      this.vx = (Math.random()-.5)*.22; this.vy = -(Math.random()*.4+.08);
      this.a = Math.random()*.5+.07; this.da = (Math.random()-.5)*.0022;
    }
    tick(){ this.x+=this.vx; this.y+=this.vy; this.a+=this.da; if(this.a<=0||this.a>=.6)this.da*=-1; if(this.y<-8)this.init(false); }
    draw(){ ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=`rgba(201,169,110,${Math.max(0,Math.min(1,this.a))})`; ctx.fill(); }
  }
  const pts = [];
  const N = Math.min(100, Math.floor(innerWidth*innerHeight/8000));
  for(let i=0;i<N;i++) pts.push(new P());
  (function loop(){ ctx.clearRect(0,0,W,H); pts.forEach(p=>{ p.tick(); p.draw(); }); requestAnimationFrame(loop); })();
})();

/* ── ENTRADAS ── */
setTimeout(() => document.getElementById('eyebrow').classList.add('visible'), 900);
setTimeout(() => document.getElementById('invite-text').classList.add('visible'), 2200);

/* ── ANIMACIÓN ── */
const envWrap   = document.getElementById('envelope-wrap');
const flapFront = document.getElementById('flap-front');
const flapBack  = document.getElementById('flap-back');
const sealGroup = document.getElementById('seal-group');
const overlay   = document.getElementById('exit-overlay');
const inviteText= document.getElementById('invite-text');
let opened = false;

function openEnvelope(){
  if(opened) return;
  opened = true;
  envWrap.classList.add('opening');
  inviteText.style.transition = 'opacity 0.5s';
  inviteText.style.opacity = '0';

  // 1. Pequeña sacudida
  shakeEnvelope(() => {
    // 2. Sello se disuelve
    animateSeal(() => {
      // 3. Solapa sube
      openFlap(() => {
        // 4. Breve pausa, luego transición elegante a carta.html
        setTimeout(() => navigateToCarta(), 320);
      });
    });
  });
}

envWrap.addEventListener('click', openEnvelope);
envWrap.addEventListener('touchend', e => { e.preventDefault(); openEnvelope(); }, { passive: false });

/* Sacudida */
function shakeEnvelope(done){
  const el = document.getElementById('envelope-svg');
  const seq = [
    { tx: -3, ty: 0, r: -1.2 },
    { tx: 3, ty: -1, r: 1.2 },
    { tx: -2, ty: 1, r: -0.8 },
    { tx: 1, ty: 0, r: 0.4 },
    { tx: 0, ty: 0, r: 0 }
  ];
  let i = 0;
  function next(){
    if(i >= seq.length){ el.style.transform = ''; done(); return; }
    const s = seq[i++];
    el.style.transition = 'transform 0.07s ease';
    el.style.transform = `translate(${s.tx}px,${s.ty}px) rotate(${s.r}deg)`;
    setTimeout(next, 75);
  }
  next();
}

/* Sello se disuelve suavemente */
function animateSeal(done){
  let start = null;
  const dur = 550;
  function frame(ts){
    if(!start) start = ts;
    const p = Math.min((ts - start) / dur, 1);
    const ease = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;
    sealGroup.setAttribute('transform', `translate(210,130) scale(${1 + ease * 0.35})`);
    sealGroup.setAttribute('opacity', String(1 - ease));
    if(p < 1) requestAnimationFrame(frame);
    else { sealGroup.setAttribute('opacity', '0'); done(); }
  }
  requestAnimationFrame(frame);
}

/* Solapa sube con ease-out pronunciado */
function openFlap(done){
  flapBack.setAttribute('opacity', '0');
  let start = null;
  const dur = 950;
  function frame(ts){
    if(!start) start = ts;
    const p = Math.min((ts - start) / dur, 1);
    // ease-out exponencial
    const ease = p === 1 ? 1 : 1 - Math.pow(2, -10 * p);
    // La solapa se repliega hacia arriba: rotación X simulada con scaleY negativo
    const scaleY = 1 - ease * 2.0;
    const opacity = 1 - ease * 0.9;
    flapFront.setAttribute('transform', `translate(210,50) scale(1,${scaleY}) translate(-210,-50)`);
    flapFront.setAttribute('opacity', String(Math.max(0, opacity)));
    flapBack.setAttribute('opacity', String(Math.min(1, ease * 1.6)));
    if(p < 1) requestAnimationFrame(frame);
    else { flapFront.setAttribute('opacity','0'); done(); }
  }
  requestAnimationFrame(frame);
}

/* Transición elegante: fade-out suave → navegar */
function navigateToCarta(){
  overlay.classList.add('show');
  setTimeout(() => {
    window.location.href = 'Carta.html';
  }, 750);
}
</script>
</body>
</html>
